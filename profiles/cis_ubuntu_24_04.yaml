profile_name: CIS Ubuntu 24.04 LTS Overlay
profile_id: CIS_UBUNTU_24_04
version: 24.04 overlay tightened
description: >
  Ubuntu 24.04 local CIS-style overlay with severity, expectation, and
  policy overrides for programmatically checkable controls.
settings_overrides:
  max_password_age_days: 365
  min_password_age_days: 1
  password_warn_age_days: 7
  ssh_login_grace_time_seconds: 60
  ssh_client_alive_interval: 300
  umask_allowed_values:
  - '027'
  - '077'
  encrypt_method_allowed_values:
  - yescrypt
  - sha512
  ptrace_scope_allowed_values:
  - '1'
  - '2'
  - '3'
  reverse_path_filter_values:
  - '1'
  require_file_integrity_tooling: true
  require_pam_password_quality: true
  require_account_lockout_controls: true
profile_defaults:
  severity: medium
  expectation: required
  rationale: Local CIS-style hardened host overlay.
  access: standard
